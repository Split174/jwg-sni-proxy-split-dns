version: '3.8'

services:
  amnezia-wg:
    build: .
    container_name: jwg-server
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    tty: true
    stdin_open: true
    ports:
      - "31797:31797/udp"
    volumes:
      - ./data-jwg:/var/lib/jwg
    environment:
      - TZ=Europe/Moscow

  coredns:
    image: coredns/coredns:latest
    container_name: coredns
    restart: unless-stopped
    network_mode: "service:amnezia-wg"
    volumes:
      - ./Corefile:/Corefile:ro
    command: -conf /Corefile
    depends_on:
      - amnezia-wg

  sni-proxy:
    image: nginx:alpine
    container_name: sni-proxy
    restart: unless-stopped
    network_mode: "service:amnezia-wg"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - amnezia-wg
